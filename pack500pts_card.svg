    <path d="M200 50 L210 75 L235 75 L215 90 L222 115 L200 100 L178 115 L185 90 L165 75 L190 75 Z" fill="url(#goldGrad)"/>
    <text x="200" y="145" text-anchor="middle" font-size="14" fill="#c9a84c" font-family="serif" font-weight="bold">Pack 500 Prompts IA</text>

    <!-- QR Code placeholder -->
